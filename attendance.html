<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worker Attendance</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Worker Attendance</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="add-worker.html">Add Worker</a>
        <a href="workers.html">Workers</a>
        <a href="attendance.html">Attendance</a>
        <a href="salary.html">Salary</a>
    </nav>
</header>

<div class="form-box">
    <h2>Mark Attendance</h2>

    <input type="text" id="workerName" placeholder="Worker Name"><br><br>

    <select id="status">
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
    </select><br><br>

    <button onclick="markAttendance()">Submit</button>
</div>

<div class="list-box">
    <h2>Attendance Record</h2>
    <div id="attendanceList"></div>
</div>

<script>
let attendance = JSON.parse(localStorage.getItem("attendance")) || [];

function markAttendance(){
    let name = document.getElementById("workerName").value;
    let status = document.getElementById("status").value;

    if(name==""){
        alert("Enter Worker Name");
        return;
    }

    attendance.push({
        name:name,
        status:status
    });

    localStorage.setItem("attendance", JSON.stringify(attendance));
    showAttendance();

    document.getElementById("workerName").value="";
}

function showAttendance(){
    let output="";

    attendance.forEach((item,index)=>{
        output += "<p>" + item.name + " - " + item.status + "</p>";
    });

    document.getElementById("attendanceList").innerHTML = output;
}

showAttendance();
</script>

</body>
</html>
