<!DOCTYPE html>
<html>
<head>
<title>Add Worker</title>
<link rel="stylesheet" href="../Static/style.css">
</head>
<body>

<h1>Add Worker</h1>

<div class="form-box">
<input type="text" id="name" placeholder="Worker Name"><br><br>
<input type="text" id="work" placeholder="Work Type"><br><br>
<input type="number" id="salary" placeholder="Salary"><br><br>

<button onclick="addWorker()">Add Worker</button>
</div>

<script>
function addWorker(){
 let name = document.getElementById("name").value;
 let work = document.getElementById("work").value;
 let salary = document.getElementById("salary").value;

 if(name=="" || work=="" || salary==""){
   alert("Fill all fields");
   return;
 }

 let workers = JSON.parse(localStorage.getItem("workers")) || [];

 workers.push({name:name, work:work, salary:salary});

 localStorage.setItem("workers", JSON.stringify(workers));

 alert("Worker Added Successfully");

 document.getElementById("name").value="";
 document.getElementById("work").value="";
 document.getElementById("salary").value="";
}
</script>

</body>
</html>
